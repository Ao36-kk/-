<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>自分日記</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#fafaf9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="自分日記" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fafaf9; font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; color: #1c1c1c; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 100px; }
    header { width: 100%; max-width: 480px; padding: 48px 24px 0; display: flex; justify-content: space-between; align-items: baseline; }
    .header-left .sub { font-size: 11px; letter-spacing: 3px; color: #999; text-transform: uppercase; margin-bottom: 4px; }
    .header-left .title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .header-date { font-size: 12px; color: #aaa; }
    nav { width: 100%; max-width: 480px; padding: 20px 24px 0; display: flex; gap: 4px; }
    nav button { flex: 1; padding: 8px 0; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
    nav button.active { background: #1c1c1c; color: #fff; }
    nav button:not(.active) { background: #efefef; color: #666; }
    main { width: 100%; max-width: 480px; padding: 24px 24px 0; }
    .card { background: #fff; border-radius: 20px; padding: 28px; box-shadow: 0 2px 20px rgba(0,0,0,.06); margin-bottom: 16px; }
    .mood-row { display: flex; justify-content: space-between; margin-bottom: 24px; }
    .mood-btn { width: 52px; height: 52px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; transition: all .2s; background: #f4f4f4; }
    .mood-btn.selected { transform: scale(1.18); }
    textarea { width: 100%; border: 1.5px solid #eee; border-radius: 12px; padding: 10px 14px; font-size: 13px; resize: none; outline: none; font-family: inherit; color: #333; background: #fafaf9; }
    input[type="date"] { width: 100%; border: 1.5px solid #eee; border-radius: 12px; padding: 10px 14px; font-size: 13px; outline: none; font-family: inherit; color: #333; background: #fafaf9; margin-bottom: 16px; -webkit-appearance: none; }
    .save-btn { width: 100%; margin-top: 12px; padding: 13px 0; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s; }
    .save-btn:disabled { background: #e5e5e5; color: #aaa; cursor: not-allowed; }
    .save-btn:not(:disabled) { background: #1c1c1c; color: #fff; }
    .edit-btn { background: #f4f4f4; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; color: #666; cursor: pointer; margin-top: 10px; }
    .section-label { font-size: 12px; color: #aaa; letter-spacing: 2px; margin-bottom: 12px; padding-left: 4px; }
    .entry-card { background: #fff; border-radius: 14px; padding: 14px 18px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 8px rgba(0,0,0,.04); }
    .entry-emoji { font-size: 28px; }
    .entry-info { flex: 1; }
    .entry-date { font-size: 12px; color: #bbb; }
    .entry-label { font-size: 13px; font-weight: 600; color: #333; }
    .entry-comment { font-size: 12px; color: #999; }
    .entry-edit { background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px; }
    .empty { text-align: center; color: #ccc; font-size: 13px; padding: 20px 0; }
    .penguin-card { background: linear-gradient(135deg, #e0f2fe, #f0fdf4); border-radius: 20px; padding: 20px 24px; box-shadow: 0 2px 20px rgba(0,0,0,.06); margin-bottom: 12px; display: flex; align-items: center; gap: 16px; }
    .dolphin-card { background: linear-gradient(135deg, #ede9fe, #fce7f3); border-radius: 20px; padding: 20px 24px; box-shadow: 0 2px 20px rgba(0,0,0,.06); margin-bottom: 16px; display: flex; align-items: flex-start; gap: 16px; }
    .mascot { font-size: 48px; animation: wobble 3s ease-in-out infinite; display: inline-block; flex-shrink: 0; }
    @keyframes wobble { 0%,100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
    .mascot-msg { font-size: 14px; font-weight: 600; color: #334155; line-height: 1.6; }
    .mascot-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .dolphin-type { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: #ddd6fe; color: #6d28d9; margin-bottom: 6px; }

    .dolphin-meaning { font-size: 13px; color: #475569; line-height: 1.5; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .calendar-title { font-size: 16px; font-weight: 700; }
    .cal-nav { background: #f4f4f4; border: none; border-radius: 8px; padding: 6px 12px; font-size: 14px; cursor: pointer; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; }
    .cal-day-label { text-align: center; font-size: 11px; color: #aaa; padding: 4px 0; font-weight: 600; }
    .cal-day { aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; background: #f9f9f9; border: none; transition: all .15s; }
    .cal-day.today { box-shadow: 0 0 0 2px #1c1c1c; }
    .cal-day.empty { background: transparent; cursor: default; }
    .cal-day .cal-emoji { font-size: 16px; }
    .cal-day .cal-num { font-size: 10px; color: #999; }
    .cal-day.today .cal-num { color: #1c1c1c; font-weight: 700; }
    .detail-card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 20px rgba(0,0,0,.08); margin-bottom: 16px; display: flex; gap: 16px; align-items: flex-start; }

    .detail-info { flex: 1; }
    .detail-date { font-size: 12px; color: #aaa; margin-bottom: 4px; }
    .detail-label { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .detail-comment { font-size: 13px; color: #666; line-height: 1.5; }
    .detail-empty { font-size: 13px; color: #ccc; }
    .graph-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .graph-title { font-size: 16px; font-weight: 700; }
    .avg-badge { background: #fff; border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: 700; box-shadow: 0 1px 8px rgba(0,0,0,.06); }
    .graph-card { background: #fff; border-radius: 20px; padding: 24px 16px; box-shadow: 0 2px 20px rgba(0,0,0,.06); overflow-x: auto; }
    .bars { display: flex; align-items: flex-end; gap: 4px; height: 120px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar-emoji { font-size: 14px; min-height: 20px; }
    .bar { width: 100%; border-radius: 6px; transition: height .3s; }
    .bar-day { font-size: 10px; }
    .mood-legend { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
    .legend-item { text-align: center; flex: 1; }
    .legend-emoji { font-size: 16px; }
    .legend-num { font-size: 10px; color: #bbb; }
    .recorded-card { display: flex; align-items: center; gap: 16px; }
    .recorded-emoji { font-size: 48px; }
    .recorded-sub { font-size: 13px; color: #999; margin-bottom: 2px; }
    .recorded-label { font-size: 18px; font-weight: 700; }
    .recorded-comment { font-size: 13px; color: #666; margin-top: 4px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
    .modal { background: #fff; border-radius: 24px 24px 0 0; padding: 28px 24px 48px; width: 100%; max-width: 480px; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
    #install-banner { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #1c1c1c; color: #fff; border-radius: 16px; padding: 14px 20px; width: calc(100% - 48px); max-width: 440px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 8px 30px rgba(0,0,0,.2); z-index: 100; font-size: 13px; }
    #install-banner button { background: #fff; color: #1c1c1c; border: none; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer; }
    #install-banner .close-btn { background: transparent; color: #666; padding: 4px 8px; margin-left: 8px; }
  </style>
</head>

:"",meaning:"あなたにも、あなたを必要としている人がいる"},{type:"慣用句",word:"触らぬ神に祟りなし",reading:"",meaning:"余計なことに関わらない方が、トラブルを避けられる"},{type:"名言",word:"素直な心が、最大の才能である",reading:"",meaning:"素直に学び、受け入れる心が、才能を最大限に引き出す"}];

let currentView='home',selectedScore=null,editingDate=null,calYear=new Date().getFullYear(),calMonth=new Date().getMonth(),selectedCalDate=null;
let entries=JSON.parse(localStorage.getItem('jibun-entries')||'{}');
const oldData=localStorage.getItem('mood-entries');
if(oldData&&Object.keys(entries).length===0){entries=JSON.parse(oldData);localStorage.setItem('jibun-entries',JSON.stringify(entries));}
function todayStr(){return new Date().toISOString().slice(0,10);}
function mood(score){return MOODS.find(function(m){return m.score===score;});}
function saveEntries(){localStorage.setItem('jibun-entries',JSON.stringify(entries));}
var penguinMsg=PENGUIN_MSGS[Math.floor(Math.random()*PENGUIN_MSGS.length)];
var dolphinMsg=DOLPHIN_MSGS[Math.floor(Math.random()*DOLPHIN_MSGS.length)];
const now=new Date();
document.getElementById('header-date').textContent=now.getFullYear()+"年"+MONTHS[now.getMonth()]+now.getDate()+"日";
function showView(v){currentView=v;document.querySelectorAll('nav button').forEach(function(btn,i){btn.classList.toggle('active',['home','calendar','graph'][i]===v);});render();}
function render(){var main=document.getElementById('main');if(currentView==='home')main.innerHTML=renderHome();else if(currentView==='calendar')main.innerHTML=renderCalendar();else main.innerHTML=renderGraphView();}
function renderHome(){
  var today=todayStr();var entry=entries[today];var html='';
  html+='<div class="penguin-card"><div class="mascot">🐧</div><div><div class="mascot-msg">'+penguinMsg+'</div><div class="mascot-sub">'+(now.getMonth()+1)+'月'+now.getDate()+'日（'+DAYS[now.getDay()]+'）</div></div></div>';
  html+='<div class="dolphin-card"><div class="mascot" style="animation-delay:.5s">🐬</div><div><span class="dolphin-type">'+dolphinMsg.type+'</span><div class="dolphin-word">'+dolphinMsg.word+'</div>'+(dolphinMsg.reading?'<div class="dolphin-reading">'+dolphinMsg.reading+(dolphinMsg.reading&&dolphinMsg.reading.length>1?' — '+dolphinMsg.reading:'')+'</div>':'')+'<div class="dolphin-meaning">'+dolphinMsg.meaning+'</div></div></div>';
  if(entry&&editingDate!==today){var m=mood(entry.score);html+='<div class="card"><div class="recorded-card"><span class="recorded-emoji">'+m.emoji+'</span><div style="flex:1"><div class="recorded-sub">今日の気分</div><div class="recorded-label">'+m.label+'</div>'+(entry.comment?'<div class="recorded-comment">'+entry.comment+'</div>':'')+'</div></div><button class="edit-btn" onclick="startEdit(\''+today+'\')">✏️ 編集する</button></div>';}
  else{var isEditing=editingDate===today;html+='<div class="card"><div style="font-size:14px;color:#999;margin-bottom:20px;text-align:center">'+(isEditing?'今日の気分を編集':'今日の気分はどうですか？')+'</div><div class="mood-row">';MOODS.forEach(function(m){var sel=selectedScore===m.score;html+='<button class="mood-btn '+(sel?'selected':'')+'" style="background:'+(sel?m.color:'#f4f4f4')+';box-shadow:'+(sel?'0 4px 16px '+m.color+'88':'none')+'" onclick="selectMood('+m.score+')">'+m.emoji+'</button>';});html+='</div>';if(selectedScore){html+='<div style="margin-bottom:16px;text-align:center;font-size:13px;color:#666;font-weight:600">'+mood(selectedScore).label+'</div>';}var currentComment=isEditing?(entry&&entry.comment?entry.comment:''):'';html+='<textarea id="comment-input" rows="2" placeholder="一言メモ（任意）">'+currentComment+'</textarea><button class="save-btn" onclick="saveEntry(\''+today+'\')" '+(selectedScore?'':'disabled')+'>'+(isEditing?'更新する':'記録する')+'</button>'+(isEditing?'<button class="edit-btn" style="width:100%;margin-top:8px;text-align:center" onclick="cancelEdit()">キャンセル</button>':'')+'</div>';}
  html+='<button onclick="openPastModal()" style="width:100%;padding:12px;border:2px dashed #e5e5e5;border-radius:14px;background:transparent;font-size:13px;color:#aaa;cursor:pointer;margin-bottom:16px;">＋ 過去の日付に記録する</button>';
  html+='<div class="section-label">RECENT</div>';
  var sorted=Object.entries(entries).sort(function(a,b){return b[0].localeCompare(a[0]);}).slice(0,10);
  if(sorted.length===0){html+='<div class="empty">まだ記録がありません</div>';}
  else{sorted.forEach(function(item){var date=item[0];var e=item[1];var d=new Date(date+'T00:00:00');var m=mood(e.score);html+='<div class="entry-card"><span class="entry-emoji">'+m.emoji+'</span><div class="entry-info"><div class="entry-date">'+(d.getMonth()+1)+'/'+d.getDate()+'（'+DAYS[d.getDay()]+'）</div><div class="entry-label">'+m.label+'</div>'+(e.comment?'<div class="entry-comment">'+e.comment+'</div>':'')+'</div><button class="entry-edit" onclick="openEditModal(\''+date+'\')">✏️</button></div>';});}
  return html;
}
function renderCalendar(){
  var today=todayStr();var firstDay=new Date(calYear,calMonth,1).getDay();var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var html='<div class="card"><div class="calendar-header"><button class="cal-nav" onclick="calPrev()">＜</button><div class="calendar-title">'+calYear+'年'+MONTHS[calMonth]+'</div><button class="cal-nav" onclick="calNext()">＞</button></div><div class="calendar-grid">';
  ['日','月','火','水','木','金','土'].forEach(function(d){html+='<div class="cal-day-label">'+d+'</div>';});
  for(var i=0;i<firstDay;i++){html+='<div class="cal-day empty"></div>';}
  for(var d=1;d<=daysInMonth;d++){var dateStr=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var entry=entries[dateStr];var m=entry?mood(entry.score):null;var isToday=dateStr===today;var bg=m?m.color+'88':'#f4f4f4';html+='<button class="cal-day'+(isToday?' today':'')+'" style="background:'+bg+'" onclick="selectDate(\''+dateStr+'\')">'+(m?'<span class="cal-emoji">'+m.emoji+'</span>':'')+'<span class="cal-num">'+d+'</span></button>';}
  html+='</div></div>';
  if(selectedCalDate){var e=entries[selectedCalDate];var sd=new Date(selectedCalDate+'T00:00:00');html+='<div class="detail-card">';if(e){var dm=mood(e.score);html+='<div class="detail-emoji">'+dm.emoji+'</div><div class="detail-info"><div class="detail-date">'+(sd.getMonth()+1)+'月'+sd.getDate()+'日（'+DAYS[sd.getDay()]+'）</div><div class="detail-label">'+dm.label+'</div>'+(e.comment?'<div class="detail-comment">'+e.comment+'</div>':'<div class="detail-empty">メモなし</div>')+'</div><button class="entry-edit" onclick="openEditModal(\''+selectedCalDate+'\')">✏️</button>';}else{html+='<div class="detail-emoji">📭</div><div class="detail-info"><div class="detail-date">'+(sd.getMonth()+1)+'月'+sd.getDate()+'日（'+DAYS[sd.getDay()]+'）</div><div class="detail-empty">記録がありません</div><button class="edit-btn" style="margin-top:8px" onclick="openEditModal(\''+selectedCalDate+'\')">＋ 記録する</button></div>';}html+='</div>';}
  else{html+='<div class="empty">日付をタップすると詳細が見られます</div>';}
  return html;
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}selectedCalDate=null;render();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}selectedCalDate=null;render();}
function selectDate(date){selectedCalDate=date;render();}
function renderGraphView(){
  var today=todayStr();var dates=getMonthDates();var scored=dates.filter(function(d){return entries[d];});
  var avg=scored.length?(scored.reduce(function(s,d){return s+entries[d].score;},0)/scored.length).toFixed(1):null;
  var html='<div class="graph-header"><div class="graph-title">'+MONTHS[new Date().getMonth()]+'の気分</div>'+(avg?'<div class="avg-badge">平均 '+avg+'</div>':'')+'</div><div class="graph-card"><div class="bars" style="min-width:'+(dates.length*28)+'px">';
  dates.forEach(function(date){var entry=entries[date];var score=entry?entry.score:0;var h=score?(score/5)*100:4;var m=score?mood(score):null;var d=new Date(date+'T00:00:00');var isToday=date===today;html+='<div class="bar-col"><div class="bar-emoji">'+(score?m.emoji:'')+'</div><div class="bar" style="height:'+h+'px;background:'+(score?m.color:'#f0f0f0')+'"></div><div class="bar-day" style="color:'+(isToday?'#1c1c1c':'#bbb')+';font-weight:'+(isToday?700:400)+'">'+d.getDate()+'</div></div>';});
  html+='</div><div class="mood-legend">';MOODS.forEach(function(m){html+='<div class="legend-item"><div class="legend-emoji">'+m.emoji+'</div><div class="legend-num">'+m.score+'</div></div>';});html+='</div></div>';
  if(!scored.length){html+='<div class="empty">この月の記録がありません</div>';}return html;
}
function selectMood(score){selectedScore=score;render();}
function saveEntry(date){if(!selectedScore)return;var comment=document.getElementById('comment-input')?document.getElementById('comment-input').value:'';entries[date]={score:selectedScore,comment:comment};saveEntries();selectedScore=null;editingDate=null;closeModal();render();}
function startEdit(date){editingDate=date;selectedScore=entries[date]?entries[date].score:null;render();}
function cancelEdit(){editingDate=null;selectedScore=null;render();}
function openPastModal(){selectedScore=null;var modal=document.getElementById('modal-root');var html='<div class="modal-overlay" onclick="closeModalOutside(event)"><div class="modal"><div class="modal-title">📅 過去の日付に記録</div><input type="date" id="past-date" max="'+todayStr()+'" value="'+todayStr()+'" /><div class="mood-row">';MOODS.forEach(function(m){html+='<button class="mood-btn" style="background:#f4f4f4" onclick="selectModalMood('+m.score+')">'+m.emoji+'</button>';});html+='</div><textarea id="past-comment" rows="2" placeholder="一言メモ（任意）"></textarea><button class="save-btn" id="past-save-btn" onclick="savePastEntry()" disabled>記録する</button><button class="edit-btn" style="width:100%;text-align:center;margin-top:8px" onclick="closeModal()">キャンセル</button></div></div>';modal.innerHTML=html;}
function openEditModal(date){var entry=entries[date];selectedScore=entry?entry.score:null;var d=new Date(date+'T00:00:00');var modal=document.getElementById('modal-root');var html='<div class="modal-overlay" onclick="closeModalOutside(event)"><div class="modal"><div class="modal-title">✏️ '+(d.getMonth()+1)+'/'+d.getDate()+'の記録を編集</div><div class="mood-row">';MOODS.forEach(function(m){var sel=selectedScore===m.score;html+='<button class="mood-btn '+(sel?'selected':'')+'" style="background:'+(sel?m.color:'#f4f4f4')+';box-shadow:'+(sel?'0 4px 16px '+m.color+'88':'none')+'" onclick="selectModalMood('+m.score+')">'+m.emoji+'</button>';});html+='</div><textarea id="past-comment" rows="2" placeholder="一言メモ（任意）">'+(entry&&entry.comment?entry.comment:'')+'</textarea><button class="save-btn" id="past-save-btn" onclick="saveEditEntry(\''+date+'\')" '+(selectedScore?'':'disabled')+'>更新する</button><button class="edit-btn" style="width:100%;text-align:center;margin-top:8px" onclick="closeModal()">キャンセル</button></div></div>';modal.innerHTML=html;}
function selectModalMood(score){selectedScore=score;document.querySelectorAll('.modal .mood-btn').forEach(function(btn,i){var m=MOODS[i];var sel=score===m.score;btn.style.background=sel?m.color:'#f4f4f4';btn.style.boxShadow=sel?'0 4px 16px '+m.color+'88':'none';btn.classList.toggle('selected',sel);});var saveBtn=document.getElementById('past-save-btn');if(saveBtn)saveBtn.disabled=false;}
function savePastEntry(){if(!selectedScore)return;var date=document.getElementById('past-date').value;var comment=document.getElementById('past-comment').value;entries[date]={score:selectedScore,comment:comment};saveEntries();selectedScore=null;closeModal();render();}
function saveEditEntry(date){if(!selectedScore)return;var comment=document.getElementById('past-comment').value;entries[date]={score:selectedScore,comment:comment};saveEntries();selectedScore=null;closeModal();selectedCalDate=date;render();}
function closeModal(){document.getElementById('modal-root').innerHTML='';selectedScore=null;}
function closeModalOutside(e){if(e.target.classList.contains('modal-overlay'))closeModal();}
function getMonthDates(){var today=new Date();var days=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();return Array.from({length:days},function(_,i){var d=new Date(today.getFullYear(),today.getMonth(),i+1);return d.toISOString().slice(0,10);});}
var deferredPrompt;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').style.display='flex';});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;document.getElementById('install-banner').style.display='none';});}}
if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js');}
render();
</script>
</body>
</html>
